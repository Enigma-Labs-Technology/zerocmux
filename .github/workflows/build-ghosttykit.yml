name: Build GhosttyKit

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GHOSTTYKIT_RELEASE_REPO: ${{ github.repository }}

jobs:
  build-ghosttykit:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Get ghostty SHA
        id: ghostty-sha
        run: |
          SHA=$(git -C ghostty rev-parse HEAD)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Ghostty SHA: $SHA"

      - name: Compute GhosttyKit release tag
        id: ghosttykit-tag
        run: |
          TAG="$(./scripts/ghosttykit-release-tag.sh "${{ steps.ghostty-sha.outputs.sha }}")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "GhosttyKit release tag: $TAG"

      - name: Check if xcframework release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRIMARY_TAG="${{ steps.ghosttykit-tag.outputs.tag }}"
          LEGACY_TAG="xcframework-${{ steps.ghostty-sha.outputs.sha }}"
          if gh release view "$PRIMARY_TAG" --repo "$GHOSTTYKIT_RELEASE_REPO" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $PRIMARY_TAG already exists, skipping build"
          elif [ "$PRIMARY_TAG" != "$LEGACY_TAG" ] && gh release view "$LEGACY_TAG" --repo "$GHOSTTYKIT_RELEASE_REPO" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Legacy release $LEGACY_TAG already exists, skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $PRIMARY_TAG not found, will build"
          fi

      - name: Select Xcode
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          if [ -d "/Applications/Xcode.app/Contents/Developer" ]; then
            XCODE_DIR="/Applications/Xcode.app/Contents/Developer"
          else
            XCODE_APP="$(ls -d /Applications/Xcode*.app 2>/dev/null | head -n 1 || true)"
            if [ -n "$XCODE_APP" ]; then
              XCODE_DIR="$XCODE_APP/Contents/Developer"
            else
              echo "No Xcode.app found under /Applications" >&2
              exit 1
            fi
          fi
          echo "DEVELOPER_DIR=$XCODE_DIR" >> "$GITHUB_ENV"
          export DEVELOPER_DIR="$XCODE_DIR"
          xcodebuild -version

      - name: Cache Zig packages
        if: steps.check-release.outputs.exists == 'false'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/zig
          key: zig-packages-${{ hashFiles('ghostty/build.zig.zon', 'ghostty/build.zig.zon.json') }}
          restore-keys: zig-packages-

      - name: Build GhosttyKit.xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          ./scripts/install-zig-ci.sh
          ./scripts/build-ghosttykit-xcframework.sh

      - name: Package xcframework
        if: steps.check-release.outputs.exists == 'false'
        run: |
          set -euo pipefail
          rm -rf GhosttyKit.xcframework
          cp -R ghostty/macos/GhosttyKit.xcframework GhosttyKit.xcframework
          COPYFILE_DISABLE=1 tar czf GhosttyKit.xcframework.tar.gz GhosttyKit.xcframework
          python3 scripts/validate-xcframework-archive.py GhosttyKit.xcframework.tar.gz

      - name: Upload xcframework release
        if: steps.check-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.ghosttykit-tag.outputs.tag }}"
          gh release create "$TAG" \
            --repo "$GHOSTTYKIT_RELEASE_REPO" \
            --prerelease \
            --title "GhosttyKit xcframework (${{ steps.ghostty-sha.outputs.sha }})" \
            --notes "Pre-built GhosttyKit.xcframework for commit ${{ steps.ghostty-sha.outputs.sha }}" \
            GhosttyKit.xcframework.tar.gz
          echo "Published release $TAG"
