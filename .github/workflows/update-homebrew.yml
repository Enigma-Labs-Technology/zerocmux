name: Update Homebrew Cask

on:
  # Trigger after the release workflow completes (not on release:published,
  # which fires before assets finish uploading — causing SHA mismatch).
  workflow_run:
    workflows: ["Release macOS app"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.58.0 or v0.58.0)'
        required: true

permissions:
  contents: read

jobs:
  update-cask:
    runs-on: ubuntu-latest
    # Only run if the release workflow succeeded (or manual trigger).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # workflow_run: extract tag from the triggering workflow's head branch
            VERSION="${{ github.event.workflow_run.head_branch }}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not determine version" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "Invalid version: ${VERSION}" >&2
              exit 1
            fi
            echo "Skipping homebrew cask update for non-release ref: ${VERSION}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Updating homebrew cask to version $VERSION"

      - name: Check Homebrew tap configuration
        id: tap_config
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping Homebrew tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! gh repo view kernelalex/homebrew-zerocmux >/dev/null 2>&1; then
            echo "kernelalex/homebrew-zerocmux is not available; skipping Homebrew tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Download DMG and get SHA256
        id: sha
        if: steps.version.outputs.skip != 'true' && steps.tap_config.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/kernelalex/zerocmux/releases/download/v${VERSION}/zerocmux-macos.dmg"
          MAX_RETRIES=5
          for i in $(seq 1 "$MAX_RETRIES"); do
            HTTP_CODE=$(curl -sL -w '%{http_code}' "$URL" -o zerocmux.dmg)
            FILE_SIZE=$(stat --printf="%s" zerocmux.dmg 2>/dev/null || stat -f%z zerocmux.dmg)
            if [ "$HTTP_CODE" = "200" ] && [ "$FILE_SIZE" -gt 1000000 ]; then
              echo "Download OK: HTTP $HTTP_CODE, size $FILE_SIZE bytes"
              break
            fi
            echo "Attempt $i/$MAX_RETRIES: HTTP $HTTP_CODE, size ${FILE_SIZE:-0} bytes"
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "Failed to download DMG after $MAX_RETRIES attempts" >&2
              exit 1
            fi
            sleep 30
          done
          SHA256=$(shasum -a 256 zerocmux.dmg | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "DMG SHA256: $SHA256"

      - name: Checkout homebrew-cmux
        if: steps.version.outputs.skip != 'true' && steps.tap_config.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: kernelalex/homebrew-zerocmux
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-cmux

      - name: Update cask formula
        if: steps.version.outputs.skip != 'true' && steps.tap_config.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          cat > homebrew-cmux/Casks/zerocmux.rb << CASKEOF
          cask "zerocmux" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/kernelalex/zerocmux/releases/download/v#{version}/zerocmux-macos.dmg"
            name "zerocmux"
            desc "Zero-telemetry native macOS terminal workspace for AI coding agents"
            homepage "https://github.com/kernelalex/zerocmux"

            livecheck do
              url :url
              strategy :github_latest
            end

            depends_on macos: ">= :sonoma"

            app "zerocmux.app"
            binary "#{appdir}/zerocmux.app/Contents/Resources/bin/zerocmux"

            zap trash: [
              "~/Library/Application Support/zerocmux",
              "~/Library/Caches/zerocmux",
              "~/Library/Preferences/com.kernelalex.zerocmux.plist",
              "~/Library/Application Support/cmux",
              "~/Library/Caches/cmux",
              "~/Library/Preferences/ai.manaflow.cmuxterm.plist",
            ]
          end
          CASKEOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' homebrew-cmux/Casks/zerocmux.rb

      - name: Verify cask SHA matches DMG
        if: steps.version.outputs.skip != 'true' && steps.tap_config.outputs.skip != 'true'
        run: |
          CASK_SHA=$(grep 'sha256' homebrew-cmux/Casks/zerocmux.rb | sed 's/.*"\(.*\)".*/\1/')
          ACTUAL_SHA=$(shasum -a 256 zerocmux.dmg | cut -d' ' -f1)
          if [ "$CASK_SHA" != "$ACTUAL_SHA" ]; then
            echo "SHA mismatch! Cask: $CASK_SHA, Actual: $ACTUAL_SHA" >&2
            exit 1
          fi
          echo "SHA verification passed: $CASK_SHA"

      - name: Commit and push
        if: steps.version.outputs.skip != 'true' && steps.tap_config.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd homebrew-cmux
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/zerocmux.rb
          if git diff --staged --quiet; then
            echo "No changes - cask already up to date"
          else
            git commit -m "Update zerocmux to ${VERSION}"
            git push
          fi
